name: Deploy proxima-hub

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  PROXIMA_ENV: prod

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v4
        with:
          run_install: false

      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        env:
          # read:packages token to pull @luisfarfan/auth from GitHub Packages (.npmrc).
          NODE_AUTH_TOKEN: ${{ secrets.NODE_AUTH_TOKEN }}

      - name: Build (production)
        run: pnpm run build

      - name: Write production runtime config.json
        run: |
          BUILD_DIR="dist/proxima-hub/browser"
          cat > "${BUILD_DIR}/config.json" <<JSON
          {
            "apiBaseUrl": "https://api.proxima.pe",
            "turnstileSiteKey": "${{ vars.TURNSTILE_SITE_KEY }}",
            "googleClientId": "${{ vars.GOOGLE_CLIENT_ID }}",
            "adminUrl": "https://admin.proxima.pe",
            "builderUrl": "https://builder.proxima.pe",
            "posUrl": "https://pos.proxima.pe",
            "intelligenceUrl": "${{ vars.INTELLIGENCE_URL }}",
            "mobileUrl": "${{ vars.MOBILE_URL }}"
          }
          JSON
          echo "==> Wrote ${BUILD_DIR}/config.json"
          cat "${BUILD_DIR}/config.json"

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy to S3 + invalidate CloudFront
        run: |
          SSM_PREFIX="/proxima/${PROXIMA_ENV}/apps/hub"
          BUILD_DIR="dist/proxima-hub/browser"

          BUCKET=$(aws ssm get-parameter \
            --region "$AWS_REGION" \
            --name "${SSM_PREFIX}/s3-bucket-name" \
            --query Parameter.Value --output text)

          CF_DIST=$(aws ssm get-parameter \
            --region "$AWS_REGION" \
            --name "${SSM_PREFIX}/cloudfront-distribution-id" \
            --query Parameter.Value --output text)

          echo "==> Syncing ${BUILD_DIR}/ to s3://${BUCKET}/"

          # Assets with content hash → immutable cache (1 year)
          aws s3 sync "${BUILD_DIR}/" "s3://${BUCKET}/" \
            --delete \
            --region "$AWS_REGION" \
            --cache-control "public,max-age=31536000,immutable" \
            --exclude "*.html" \
            --exclude "*.json"

          # HTML and JSON (incl. config.json) → no-cache so deploys are immediate
          aws s3 sync "${BUILD_DIR}/" "s3://${BUCKET}/" \
            --delete \
            --region "$AWS_REGION" \
            --cache-control "no-cache,no-store,must-revalidate" \
            --include "*.html" \
            --include "*.json"

          echo "==> Invalidating CloudFront distribution ${CF_DIST}"
          aws cloudfront create-invalidation \
            --distribution-id "$CF_DIST" \
            --paths "/*" \
            --output text --query 'Invalidation.Id'

          echo "==> Done. hub deployed to s3://${BUCKET}/"
        env:
          AWS_REGION: ${{ env.AWS_REGION }}
          PROXIMA_ENV: ${{ env.PROXIMA_ENV }}
