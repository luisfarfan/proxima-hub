<a href="#main-content" class="proxima-skip-link">Saltar al contenido principal</a>

<div class="hub-shell">
  <header class="hub-top">
    <a routerLink="/" class="hub-mark" aria-label="Próxima — ir al inicio">Próxima</a>
    @if (appVersion(); as version) {
      <span class="hub-version" title="v{{ version }}">v{{ version }}</span>
    }
    <div class="hub-top-r">
      <button
        class="hub-biz"
        type="button"
        (click)="switchBusiness()"
        aria-label="Cambiar negocio: {{ activeBusinessName() }}"
      >
        <span class="hub-biz-mono" aria-hidden="true">{{ activeBusinessInitial() }}</span>
        <span class="hub-biz-name">{{ activeBusinessName() }}</span>
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="6 9 12 15 18 9"/></svg>
      </button>

      <button
        class="hub-avatar"
        type="button"
        aria-label="Opciones de cuenta"
        aria-haspopup="menu"
        [attr.aria-expanded]="accountMenuOpen()"
        (click)="toggleAccountMenu(accountMenu, $event)"
      >{{ userInitial() }}</button>
      <p-menu
        #accountMenu
        [popup]="true"
        [model]="accountMenuItems"
        (onShow)="accountMenuOpen.set(true)"
        (onHide)="accountMenuOpen.set(false)"
      />
    </div>
  </header>

  <router-outlet />
</div>
