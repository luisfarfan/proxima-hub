<app-auth-guest-shell
  title="Recuperar contraseña"
  subtitle="Te enviaremos un enlace para restablecerla"
  testId="forgot-password-page"
>
  @if (submitted()) {
    <div class="space-y-5">
      <app-auth-inline-alert
        severity="success"
        message="Revisa tu bandeja de entrada, te enviamos el enlace."
      />
      <a
        routerLink="/login"
        [class]="linkClass + ' block text-center'"
        data-testid="forgot-password-back-login"
      >
        Volver al inicio de sesión
      </a>
    </div>
  } @else {
    <form [formGroup]="form" (ngSubmit)="submit()" class="space-y-5">
      <div class="flex flex-col gap-1.5">
        <label for="forgot-email" [class]="labelClass">Correo electrónico</label>
        <input
          data-testid="forgot-password-email"
          pInputText
          id="forgot-email"
          type="email"
          autocomplete="username"
          [formControl]="form.controls.email"
          [class]="inputClass"
        />
        @if (form.controls.email.invalid && form.controls.email.touched) {
          <p [class]="fieldErrorClass">Ingresa un correo válido.</p>
        }
      </div>

      <p-button
        data-testid="forgot-password-submit"
        type="submit"
        label="Enviar enlace"
        [styleClass]="btnClass"
        [loading]="loading()"
      />

      <p class="text-center">
        <a routerLink="/login" [class]="linkClass">Volver al inicio de sesión</a>
      </p>
    </form>
  }
</app-auth-guest-shell>
