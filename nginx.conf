# Angular SPA served by nginx (prod-like). Runtime config.json is mounted at
# runtime so changing API/hub URLs does NOT require an image rebuild.
server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Runtime config + index: never cache (env can change between deploys).
  location = /config.json {
    add_header Cache-Control "no-store" always;
    try_files $uri =404;
  }
  location = /index.html {
    add_header Cache-Control "no-store" always;
  }

  # Hashed build assets: cache hard.
  location ~* \.(?:js|css|woff2?|ttf|eot|png|jpe?g|gif|svg|ico|webp|avif)$ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  # SPA fallback: any unknown path → index.html (Angular router takes over).
  location / {
    try_files $uri $uri/ /index.html;
  }
}
